services:

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    command: celery -A campaigns.tasks worker --loglevel=info --concurrency=4
    restart: unless-stopped
